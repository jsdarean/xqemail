<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求催办系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <!-- 顶部导航 -->
        <nav class="top-nav">
            <div class="nav-content">
                <div class="nav-brand">
                    <span class="icon">📧</span>
                    <span>需求催办系统</span>
                </div>
                <div class="nav-links">
                    <a href="/" class="active">需求清单</a>
                    <a href="/reminder.html">催办提醒</a>
                    <a href="/todo.html">我的待办<span class="nav-badge" id="todoBadge" style="display:none;"></span></a>
                    <a href="/group.html">集团需求</a>
                    <a href="#" onclick="logout(); return false;" style="color: var(--danger);">退出登录</a>
                </div>
            </div>
        </nav>

        <!-- 主内容 -->
        <main class="main-content">
            <div class="container">
                <!-- 消息提示 -->
                <div class="message" id="message"></div>

                <!-- 工作量初评提示卡片 -->
                <div class="page-header">
                    <h1>📋 需求清单</h1>
                    <div class="summary" id="summary">正在加载数据...</div>
                </div>

                <!-- 数据表格卡片 -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">需求列表</div>
                        <div class="toolbar">
                            <div class="toolbar-group">
                                <button class="btn-primary" onclick="loadData()">🔄 刷新</button>
                                <button class="btn-info" onclick="toggleAllRows()">📋 展开/折叠</button>
                            </div>
                            <div class="toolbar-group">
                                <button class="btn-warning" onclick="saveAll()">💾 保存修改</button>
                            </div>
                            <div class="toolbar-group">
                                <button class="btn-secondary" onclick="openEmailRecords()">📋 催办记录</button>
                                <button class="btn-secondary" onclick="openEmailConfig()">⚙️ 邮箱设置</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body" style="padding-top: 0;">
                        <div class="table-container">
                            <table id="dataTable">
                                <thead>
                                    <tr>
                                        <th style="width: 3%;"></th>
                                        <th style="width: 9%;">需求ID</th>
                                        <th style="width: 9%;">提出时间</th>
                                        <th style="width: 18%;">需求名称</th>
                                        <th style="width: 7%;">提单人</th>
                                        <th style="width: 14%;">涉及系统</th>
                                        <th style="width: 13%;">责任人</th>
                                        <th style="width: 7%;">工作量(人天)</th>
                                        <th style="width: 6%; text-align: center;">涉及开发</th>
                                        <th style="width: 10%;">开发单号</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody">
                                    <tr>
                                        <td colspan="10" class="loading">正在加载数据...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="pagination-wrapper">
                            <div class="page-info" id="pageInfo"></div>
                            <div class="page-nav" id="pageNav"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 需求详情弹窗 -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header green">
                <h2 id="modalTitle">需求详情</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- 催办记录弹窗 -->
    <div id="emailRecordsModal" class="modal">
        <div class="modal-content wide">
            <div class="modal-header">
                <h2 id="emailRecordsTitle">📋 催办记录（最近20条）</h2>
                <button class="modal-close" onclick="closeEmailRecordsModal()">&times;</button>
            </div>
            <div class="modal-body" id="emailRecordsBody">
                <p style="text-align:center;color:var(--ink-mute);">加载中...</p>
            </div>
        </div>
    </div>

    <!-- 邮箱设置弹窗 -->
    <div class="modal-overlay" id="emailConfigModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2>⚙️ 邮箱设置</h2>
                <button class="modal-close" onclick="closeEmailConfig()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="configStatus" class="config-status warn">⚠️ 正在加载配置...</div>

                <div class="form-section-title">SMTP 发信设置</div>
                <div class="form-group">
                    <label>SMTP 服务器</label>
                    <input type="text" id="cfg-smtp-host" placeholder="如 smtp.example.com">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>端口</label>
                        <input type="number" id="cfg-smtp-port" placeholder="465" value="465">
                    </div>
                    <div class="form-group">
                        <label>&nbsp;</label>
                        <label style="display:flex;align-items:center;gap:8px;margin-top:8px;font-weight:normal;">
                            <input type="checkbox" id="cfg-smtp-secure" checked> SSL/TLS 加密
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label>发件人邮箱</label>
                    <input type="email" id="cfg-smtp-user" placeholder="如 user@example.com">
                </div>
                <div class="form-group">
                    <label>邮箱密码 / 授权码</label>
                    <input type="password" id="cfg-smtp-pass" placeholder="留空表示不修改">
                </div>

                <div class="form-section-title">IMAP 存档设置（可选）</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>IMAP 服务器</label>
                        <input type="text" id="cfg-imap-host" placeholder="如 imap.example.com">
                    </div>
                    <div class="form-group">
                        <label>IMAP 端口</label>
                        <input type="number" id="cfg-imap-port" placeholder="993" value="993">
                    </div>
                </div>

                <div class="form-section-title">其他</div>
                <div class="form-group">
                    <label>邮件签名（可选）</label>
                    <textarea id="cfg-signature" placeholder="如：张三&#10;科技有限公司" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>默认抄送（可选，多个用分号隔开）</label>
                    <input type="text" id="cfg-defaultCc" placeholder="如 cc1@example.com;cc2@example.com">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-warning btn-modal-test" onclick="testSmtpConfig()">📧 测试连接</button>
                <button class="btn-gray" onclick="closeEmailConfig()">取消</button>
                <button class="btn-primary" onclick="saveEmailConfig()">保存</button>
            </div>
        </div>
    </div>

    <script src="/js/index.js"></script>
</body>
</html>
